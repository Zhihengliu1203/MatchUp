<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify your email — MatchUp</title>

    <script type="module">
        import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {getAuth, onAuthStateChanged, signOut, sendEmailVerification}
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVK43y-2BlF8lue18LqhZAFRP021GI01Y",
            authDomain: "matchup-165ee.firebaseapp.com",
            projectId: "matchup-165ee",
            storageBucket: "matchup-165ee.firebasestorage.app",
            messagingSenderId: "1038165665131",
            appId: "1:1038165665131:web:d38bcec6f394d7cf22582e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window._auth = auth;
        window._fbSendVerification = (user) => sendEmailVerification(user, {
            url: window.location.origin + window.location.pathname.replace(/verify-email\.html$/, 'dashboard.html'),
            handleCodeInApp: false
        });
        window._fbSignOut = () => signOut(auth);
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/verify-email.css" />
</head>
<body>
<div class="card">
    <div class="icon">📬</div>
    <h1>Check your email</h1>
    <p>We sent a verification link to <span class="email" id="userEmail">your inbox</span>.<br>
        Click the link to activate your account.</p>

    <div class="status" id="status">⏳ Waiting for verification…</div>

    <div class="actions">
        <button class="btn-primary" id="resendBtn">Resend email</button>
        <button class="btn-secondary" id="checkBtn">I verified — check now</button>
        <button class="btn-secondary" onclick="doLogOut()">Log out</button>
    </div>

    <p class="tip">Didn't get it? Check your spam folder. Verification link expires in 24 hours.</p>
</div>

<script>
    (async function main() {
        let tries = 0;
        while (!window._auth && tries < 40) {
            await new Promise(r => setTimeout(r, 50));
            tries++;
        }
        if (!window._auth) {
            document.getElementById('status').className = 'status err';
            document.getElementById('status').textContent = '⚠️ Firebase did not load.';
            return;
        }

        let user = window._auth.currentUser;
        if (!user) {
            user = await new Promise(resolve => {
                let done = false;
                const timer = setTimeout(() => {
                    if (!done) {
                        done = true;
                        resolve(null);
                    }
                }, 3000);
                const unsub = window._auth.onAuthStateChanged(u => {
                    if (!done) {
                        done = true;
                        clearTimeout(timer);
                        unsub();
                        resolve(u);
                    }
                });
            });
        }

        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        if (user.emailVerified) {
            document.getElementById('status').className = 'status ok';
            document.getElementById('status').textContent = '✅ Already verified! Redirecting…';
            setTimeout(() => window.location.href = 'dashboard.html', 1000);
            return;
        }

        document.getElementById('userEmail').textContent = user.email || 'your inbox';

        const resendBtn = document.getElementById('resendBtn');
        let cooldown = 0;
        resendBtn.addEventListener('click', async () => {
            if (cooldown > 0) return;
            resendBtn.disabled = true;
            document.getElementById('status').className = 'status';
            document.getElementById('status').textContent = '📧 Sending…';
            try {
                await window._fbSendVerification(user);
                document.getElementById('status').className = 'status ok';
                document.getElementById('status').textContent = '✅ Email sent! Check your inbox.';
                cooldown = 60;
                const tick = setInterval(() => {
                    cooldown--;
                    if (cooldown <= 0) {
                        clearInterval(tick);
                        resendBtn.disabled = false;
                        resendBtn.textContent = 'Resend email';
                    } else {
                        resendBtn.textContent = `Resend in ${cooldown}s`;
                    }
                }, 1000);
            } catch (err) {
                document.getElementById('status').className = 'status err';
                document.getElementById('status').textContent = '❌ ' + (err.message || 'Failed to send');
                resendBtn.disabled = false;
            }
        });

        document.getElementById('checkBtn').addEventListener('click', async () => {
            document.getElementById('status').className = 'status';
            document.getElementById('status').textContent = '⏳ Checking…';
            try {
                await user.reload();
                if (user.emailVerified) {
                    document.getElementById('status').className = 'status ok';
                    document.getElementById('status').textContent = '✅ Verified! Redirecting…';
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    document.getElementById('status').className = 'status err';
                    document.getElementById('status').textContent = 'Still not verified. Click the link in the email.';
                }
            } catch (err) {
                document.getElementById('status').className = 'status err';
                document.getElementById('status').textContent = '❌ ' + err.message;
            }
        });

        let pollCount = 0;
        const poll = setInterval(async () => {
            pollCount++;
            if (pollCount > 240) {
                clearInterval(poll);
                return;
            }
            try {
                await user.reload();
                if (user.emailVerified) {
                    clearInterval(poll);
                    document.getElementById('status').className = 'status ok';
                    document.getElementById('status').textContent = '✅ Verified! Redirecting…';
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                }
            } catch (_) {
            }
        }, 5000);
    })();

    function doLogOut() {
        localStorage.removeItem('mu_current_user');
        if (window._fbSignOut) window._fbSignOut();
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
